short_bio: <div>
  <p>
  Hi, my name is Le Thien Phuc Nguyen. </p> <p> I am from Vietnam, and I am a CS PhD student at the University of North Carolina at Chapel Hill, advised by Professor <a href="https://jason718.github.io/"> Zhongzheng (Jason) Ren </a>.
  </p>

  <p>
  Previously, I was an Undergraduate Researcher at Wisconsin AI Vision Lab (WAIV), University of Wisconsin-Madison, working with Professor <a href="https://pages.cs.wisc.edu/~yongjaelee/"> Yong Jae Lee </a>. 
  At WAIV, I am fortunate to work with my mentor who taught me a lot, <a href="https://www.zhuoranyu.com/"> Dr. Zhuoran Yu </a>.
  </p>

  <p>
  I received my B.S. in Computer Science, Data Science, Math, and Statistics (4 majors) from the University of Wisconsin-Madison in 2026.
  </p>
  
  <p>
  My research interests focus on multimodal models, with a particular emphasis on video, audio, image, and large language models (LLMs).
  </p>
  </div>
